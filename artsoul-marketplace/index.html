<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: {
                            bg: '#f5f5f5',
                            text: '#1a1a1a',
                            accent: '#0066cc',
                        },
                        future: {
                            bg: '#0a0a0f',
                            text: '#e0e0ff',
                            neon: '#00ffff',
                            pink: '#ff00ff',
                            purple: '#8b00ff',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        /* Smooth transitions */
        * {
            transition: all 0.3s ease;
        }

        /* Neon effects */
        .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        .neon-border {
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
            animation: border-glow 3s ease-in-out infinite;
        }

        /* Animations */
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        @keyframes border-glow {
            0%, 100% { box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            50% { box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 45px #00ffff; }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Hover effects */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
        }

        /* Gradient backgrounds */
        .gradient-brutal {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        }
        .gradient-future {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
        }

        /* Shimmer effect for loading */
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }

        /* Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Glassmorphism */
        .glass {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="min-h-screen transition-colors duration-500">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect } = React;

        const mockArtworks = [
            { id: 1, title: 'Soul Flame', artist: 'Maysonkiller', type: 'NFT', description: 'A burning representation of the digital soul', currentBid: 0.5, bids: [0.3, 0.4, 0.5] },
            { id: 2, title: 'Neon Dreams', artist: 'CryptoArtist', type: 'Digital Art', description: 'Futuristic cityscape in neon colors', currentBid: 1.2, bids: [0.8, 1.0, 1.2] },
            { id: 3, title: 'Silent Choir', artist: 'Maysonkiller', type: 'Video', description: 'An audiovisual journey through silence', currentBid: 0.8, bids: [0.5, 0.7, 0.8] },
            { id: 4, title: 'Cosmic Melancholy', artist: 'StarGazer', type: 'GIF', description: 'Animated loop of cosmic emotions', currentBid: 0.3, bids: [0.1, 0.2, 0.3] },
            { id: 5, title: 'Real Canvas #1', artist: 'TraditionalArt', type: 'Physical Art', description: 'Oil painting on canvas - tokenized', currentBid: 2.5, bids: [1.5, 2.0, 2.5] },
            { id: 6, title: 'Pixel Poetry', artist: 'DigitalPoet', type: 'Image', description: 'Generative pixel art with hidden meaning', currentBid: 0.6, bids: [0.4, 0.5, 0.6] },
        ];

        function App() {
            const [theme, setTheme] = useState('brutal');
            const [walletConnected, setWalletConnected] = useState(false);
            const [filter, setFilter] = useState('all');
            const [bidAmount, setBidAmount] = useState('');
            const [timeLeft, setTimeLeft] = useState(3 * 24 * 60 * 60);
            const [allArtworks, setAllArtworks] = useState([]);
            const [selectedArtwork, setSelectedArtwork] = useState(null);

            const isBrutal = theme === 'brutal';
            const filters = ['all', 'NFT', 'Digital Art', 'Video', 'GIF', 'Physical Art', 'Image', 'Music'];

            // Load artworks from localStorage + mock data
            useEffect(() => {
                const uploadedArtworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                const combined = [...mockArtworks, ...uploadedArtworks];
                setAllArtworks(combined);
                setSelectedArtwork(combined[0]);
            }, []);

            const filteredArtworks = filter === 'all'
                ? allArtworks
                : allArtworks.filter(art => art.type === filter);

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(prev => (prev > 0 ? prev - 1 : 0));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (seconds) => {
                const days = Math.floor(seconds / (24 * 60 * 60));
                const hours = Math.floor((seconds % (24 * 60 * 60)) / (60 * 60));
                const mins = Math.floor((seconds % (60 * 60)) / 60);
                const secs = seconds % 60;
                return `${days}d ${hours}h ${mins}m ${secs}s`;
            };

            const handleConnectWallet = () => {
                setWalletConnected(true);
                alert('Wallet connection will be implemented with Web3 integration');
            };

            const handlePlaceBid = () => {
                if (!walletConnected) {
                    alert('Please connect your wallet first');
                    return;
                }
                const bid = parseFloat(bidAmount);
                if (!bid || bid <= selectedArtwork.currentBid) {
                    alert(`Bid must be higher than current floor: ${selectedArtwork.currentBid} ETH`);
                    return;
                }
                alert(`Bid placed: ${bid} ETH for "${selectedArtwork.title}"\n\nThis will be implemented with smart contracts`);
                setBidAmount('');
            };

            const bgClass = isBrutal
                ? 'bg-gray-100 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-purple-100';

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${isBrutal ? 'bg-white/90 border-b border-gray-300' : 'bg-black/50 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div className="flex items-center gap-4">
                                    <h1 className={`text-3xl font-bold ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                        ArtSoul
                                    </h1>
                                    <span className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                                        Decentralized Art Marketplace
                                    </span>
                                </div>

                                <div className="flex items-center gap-4">
                                    <div className={`flex gap-2 p-1 rounded-lg ${isBrutal ? 'bg-gray-200' : 'bg-gray-800/50'}`}>
                                        <button
                                            onClick={() => setTheme('brutal')}
                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
                                                theme === 'brutal'
                                                    ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50'
                                                    : isBrutal ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            Brutal
                                        </button>
                                        <button
                                            onClick={() => setTheme('future')}
                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
                                                theme === 'future'
                                                    ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg neon-border'
                                                    : isBrutal ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            Future
                                        </button>
                                    </div>

                                    <div className={`hidden md:flex items-center gap-2 px-3 py-2 rounded-lg ${isBrutal ? 'bg-gray-100 text-gray-700' : 'bg-gray-800/50 text-cyan-300'}`}>
                                        <div className={`w-2 h-2 rounded-full ${isBrutal ? 'bg-green-500' : 'bg-cyan-400 animate-pulse'}`} />
                                        <span className="text-sm">Multi-chain</span>
                                    </div>

                                    <a
                                        href="docs.html"
                                        className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                            isBrutal
                                                ? 'bg-green-600 text-white hover:bg-green-700 shadow-lg shadow-green-500/50'
                                                : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white hover:shadow-2xl neon-border'
                                        }`}
                                    >
                                        📚 Docs
                                    </a>

                                    <a
                                        href="profile.html"
                                        className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                            isBrutal
                                                ? 'bg-gray-600 text-white hover:bg-gray-700 shadow-lg shadow-gray-500/50'
                                                : 'bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:shadow-2xl neon-border'
                                        }`}
                                    >
                                        👤 Profile
                                    </a>

                                    <a
                                        href="upload.html"
                                        className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                            isBrutal
                                                ? 'bg-purple-600 text-white hover:bg-purple-700 shadow-lg shadow-purple-500/50'
                                                : 'bg-gradient-to-r from-pink-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                        }`}
                                    >
                                        📤 Upload
                                    </a>

                                    <button
                                        onClick={handleConnectWallet}
                                        className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                            walletConnected
                                                ? isBrutal
                                                    ? 'bg-green-600 text-white shadow-lg shadow-green-500/50'
                                                    : 'bg-gradient-to-r from-green-500 to-cyan-500 text-white neon-border'
                                                : isBrutal
                                                    ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-500/50'
                                                    : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                        }`}
                                    >
                                        {walletConnected ? '0x...1234' : 'Connect Wallet'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Gallery */}
                            <div className="lg:col-span-2">
                                <div className={`rounded-xl p-6 ${isBrutal ? 'bg-white shadow-lg border border-gray-200' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30 neon-border'}`}>
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className={`text-2xl font-bold ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            Gallery
                                        </h2>
                                        <span className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                                            {filteredArtworks.length} artworks
                                        </span>
                                    </div>

                                    <div className="flex flex-wrap gap-2 mb-6">
                                        {filters.map(f => (
                                            <button
                                                key={f}
                                                onClick={() => setFilter(f)}
                                                className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                                    filter === f
                                                        ? isBrutal
                                                            ? 'bg-blue-600 text-white'
                                                            : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white'
                                                        : isBrutal
                                                            ? 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                            : 'bg-gray-800/50 text-gray-300 hover:bg-gray-700/50'
                                                }`}
                                            >
                                                {f}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {filteredArtworks.map((artwork, index) => (
                                            <div
                                                key={artwork.id}
                                                onClick={() => setSelectedArtwork(artwork)}
                                                style={{animationDelay: `${index * 0.1}s`}}
                                                className={`cursor-pointer rounded-lg overflow-hidden card-hover animate-fadeIn ${
                                                    selectedArtwork?.id === artwork.id
                                                        ? isBrutal
                                                            ? 'ring-4 ring-blue-600 shadow-xl scale-105'
                                                            : 'ring-4 ring-cyan-400 shadow-2xl neon-border scale-105'
                                                        : isBrutal
                                                            ? 'hover:shadow-xl hover:shadow-blue-200'
                                                            : 'hover:shadow-cyan-500/50 hover:shadow-2xl'
                                                } ${isBrutal ? 'bg-white shadow-md' : 'bg-gray-800/50 backdrop-blur-sm'}`}
                                            >
                                                <div className={`aspect-square flex items-center justify-center relative overflow-hidden ${isBrutal ? 'bg-gradient-to-br from-gray-100 to-gray-200' : 'bg-gradient-to-br from-purple-900/50 via-pink-900/30 to-cyan-900/50'}`}>
                                                    {!isBrutal && <div className="absolute inset-0 shimmer opacity-20"></div>}
                                                    <div className="text-center p-4 relative z-10 animate-float">
                                                        <div className={`text-5xl mb-2 ${isBrutal ? 'text-gray-400' : 'text-cyan-400'}`}>
                                                            {artwork.type === 'Video' ? '🎬' : artwork.type === 'GIF' ? '🎞️' : '🖼️'}
                                                        </div>
                                                        <div className={`text-sm font-medium ${isBrutal ? 'text-gray-500' : 'text-purple-300'}`}>
                                                            {artwork.type}
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="p-4">
                                                    <h3 className={`font-bold text-lg mb-1 ${isBrutal ? 'text-gray-900' : 'text-cyan-300'}`}>
                                                        {artwork.title}
                                                    </h3>
                                                    <p className={`text-sm mb-2 ${isBrutal ? 'text-gray-600' : 'text-gray-400'}`}>
                                                        by {artwork.artist}
                                                    </p>
                                                    <div className="flex items-center justify-between">
                                                        <span className={`text-xs ${isBrutal ? 'text-gray-500' : 'text-purple-300'}`}>
                                                            Floor: {artwork.currentBid} ETH
                                                        </span>
                                                        <span className={`text-xs ${isBrutal ? 'text-blue-600' : 'text-cyan-400'}`}>
                                                            {artwork.bids.length} bids
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Auction Panel */}
                            <div className="lg:col-span-1">
                                <div className={`rounded-xl p-6 sticky top-24 ${isBrutal ? 'bg-white shadow-lg border border-gray-200' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30 neon-border'}`}>
                                    <div className="mb-6">
                                        <h2 className={`text-2xl font-bold mb-2 ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            {selectedArtwork.title}
                                        </h2>
                                        <p className={`text-sm mb-4 ${isBrutal ? 'text-gray-600' : 'text-gray-400'}`}>
                                            by {selectedArtwork.artist}
                                        </p>
                                        <p className={`text-sm ${isBrutal ? 'text-gray-700' : 'text-purple-300'}`}>
                                            {selectedArtwork.description}
                                        </p>
                                    </div>

                                    <div className={`rounded-lg p-4 mb-6 ${isBrutal ? 'bg-gray-50' : 'bg-gray-800/50'}`}>
                                        <div className={`text-xs mb-2 ${isBrutal ? 'text-gray-600' : 'text-gray-400'}`}>
                                            Auction ends in
                                        </div>
                                        <div className={`text-2xl font-bold ${isBrutal ? 'text-blue-600' : 'text-cyan-400'}`}>
                                            {formatTime(timeLeft)}
                                        </div>
                                    </div>

                                    <div className={`rounded-lg p-4 mb-6 ${isBrutal ? 'bg-blue-50' : 'bg-gradient-to-br from-purple-900/30 to-cyan-900/30'}`}>
                                        <div className={`text-xs mb-2 ${isBrutal ? 'text-gray-600' : 'text-gray-400'}`}>
                                            Current Floor Price
                                        </div>
                                        <div className={`text-3xl font-bold ${isBrutal ? 'text-blue-600' : 'text-cyan-400 neon-glow'}`}>
                                            {selectedArtwork.currentBid} ETH
                                        </div>
                                        <div className={`text-xs mt-2 ${isBrutal ? 'text-gray-500' : 'text-purple-300'}`}>
                                            {selectedArtwork.bids.length} community bids
                                        </div>
                                    </div>

                                    <div className="mb-6">
                                        <h3 className={`text-sm font-semibold mb-3 ${isBrutal ? 'text-gray-700' : 'text-cyan-300'}`}>
                                            Recent Bids
                                        </h3>
                                        <div className="space-y-2">
                                            {selectedArtwork.bids.slice().reverse().map((bid, index) => (
                                                <div
                                                    key={index}
                                                    className={`flex items-center justify-between p-2 rounded ${isBrutal ? 'bg-gray-50' : 'bg-gray-800/30'}`}
                                                >
                                                    <span className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-gray-400'}`}>
                                                        0x{Math.random().toString(36).substring(2, 8)}...
                                                    </span>
                                                    <span className={`text-sm font-semibold ${isBrutal ? 'text-blue-600' : 'text-cyan-400'}`}>
                                                        {bid} ETH
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className={`block text-sm font-semibold mb-2 ${isBrutal ? 'text-gray-700' : 'text-cyan-300'}`}>
                                            Place Your Bid
                                        </label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={bidAmount}
                                            onChange={(e) => setBidAmount(e.target.value)}
                                            placeholder={`Min: ${selectedArtwork.currentBid + 0.1} ETH`}
                                            className={`w-full px-4 py-3 rounded-lg mb-4 ${
                                                isBrutal
                                                    ? 'bg-gray-50 border border-gray-300 text-gray-900 focus:ring-2 focus:ring-blue-600'
                                                    : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100 focus:ring-2 focus:ring-cyan-400'
                                            } outline-none transition-all`}
                                        />
                                        <button
                                            onClick={handlePlaceBid}
                                            disabled={!walletConnected}
                                            className={`w-full py-3 rounded-lg font-bold transform hover:scale-105 ${
                                                walletConnected
                                                    ? isBrutal
                                                        ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-500/50'
                                                        : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border hover:from-cyan-400 hover:to-purple-400'
                                                    : isBrutal
                                                        ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
                                                        : 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                            }`}
                                        >
                                            {walletConnected ? 'Place Bid' : 'Connect Wallet to Bid'}
                                        </button>
                                    </div>

                                    <div className={`mt-6 p-4 rounded-lg text-xs ${isBrutal ? 'bg-gray-50 text-gray-600' : 'bg-gray-800/30 text-gray-400'}`}>
                                        <p className="mb-2">
                                            ℹ️ This is a price discovery auction. Your bid helps set the floor price.
                                        </p>
                                        <p>
                                            🛡️ Anti-bot protection active. Only verified wallets can bid.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Future Theme Background Effects */}
                    {theme === 'future' && (
                        <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                            <div className="absolute inset-0 bg-gradient-to-br from-purple-900/20 via-transparent to-cyan-900/20" />
                            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-pulse-slow" />
                            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl animate-pulse-slow" style={{animationDelay: '2s'}} />
                            <div className="absolute top-1/2 left-1/2 w-64 h-64 bg-pink-500/10 rounded-full blur-3xl animate-pulse-slow" style={{animationDelay: '4s'}} />

                            {/* Floating particles */}
                            {[...Array(20)].map((_, i) => (
                                <div
                                    key={i}
                                    className="particle absolute bg-cyan-400/20"
                                    style={{
                                        width: Math.random() * 4 + 2 + 'px',
                                        height: Math.random() * 4 + 2 + 'px',
                                        left: Math.random() * 100 + '%',
                                        top: Math.random() * 100 + '%',
                                        animation: `float ${Math.random() * 10 + 5}s ease-in-out infinite`,
                                        animationDelay: Math.random() * 5 + 's'
                                    }}
                                />
                            ))}
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="mt-16 pb-8 text-center">
                        <p className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                            ArtSoul Marketplace - Built by <a href="https://twitter.com/maysonkiller23" target="_blank" className={isBrutal ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}>@maysonkiller23</a>
                        </p>
                        <p className={`text-xs mt-2 ${isBrutal ? 'text-gray-500' : 'text-gray-500'}`}>
                            Multi-chain decentralized art auction platform
                        </p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
