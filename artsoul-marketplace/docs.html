Мы создаем пространство, где каждый художник может представить свою работу миру, а сообщество решает её истинную ценность через прозрачный аукционный процесс.`

• Высокие комиссии (30-50%)
• Нет прозрачности в ценообразовании
• Сложный доступ для коллекционеров

Web3 решения часто:
• Слишком технические для обычных пользователей
• Фокусируются только на NFT
• Игнорируют реальное искусство
• Не имеют удобного UX`

                    title: '💡 Решение',
                    icon: '🚀',

1. **Демократизация ценообразования**
   - Сообщество голосует ставками
   - Прозрачный процесс формирования цены
   - Нет обязательства покупки при ставке

   - Drag & drop загрузка

   - Ethereum, Polygon, BSC, Solana, Xion
   - Любой кошелек
   - Низкие комиссии`

                    title: '⚙️ Как это работает',

1. Создай профиль
2. Загрузи свою работу
3. Укажи свою оценку (опционально)
4. Сообщество делает ставки
5. Формируется floor price
6. Работа выставляется на аукцион

**Для коллекционеров:**
1. Подключи кошелек
2. Просматривай галерею
3. Делай ставки на понравившиеся работы
4. Твоя ставка влияет на floor price
5. Покупай по рыночной цене

**Ценообразование:**
- Художник указывает свою оценку
- Сообщество делает ставки
- Максимальная ставка = floor price
- Это не обязательство покупки
- Это голосование за ценность`

✅ Умная система загрузки
✅ Профили пользователей
✅ Персональные галереи
✅ Анимации и эффекты

🚧 Web3 интеграция (Wagmi/WalletConnect)
🚧 Multi-chain поддержка
🚧 Смарт-контракты для аукционов

🚧 IPFS хранилище

🎯 Смарт-контракты

**Q4 2026:**
🎯 Социальные функции

- WalletConnect
- Ethers.js

**Blockchain:**
- Ethereum (основная сеть)
- Polygon (низкие комиссии)
- BSC, Solana, Xion
- Smart contracts (Solidity)

**Backend (планируется):**
- Node.js / Express
- PostgreSQL

Maysonkiller (@maysonkiller23)

• Прозрачное ценообразование
• Участие в формировании ценности

• Демократизация арт-рынка
• Голосование за ценность
• Влияние на культуру

• Новая экономика искусства`

                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
