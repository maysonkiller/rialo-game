<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - ArtSoul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: { bg: '#f5f5f5', text: '#1a1a1a', accent: '#0066cc' },
                        future: { bg: '#0a0a0f', text: '#e0e0ff', neon: '#00ffff', pink: '#ff00ff', purple: '#8b00ff' },
                    },
                },
            },
        }
    </script>
    <style>
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        .neon-border {
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="min-h-screen transition-colors duration-500">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState } = React;

        function DocsPage() {
            const [theme, setTheme] = useState('brutal');
            const isBrutal = theme === 'brutal';

            const bgClass = isBrutal
                ? 'bg-gray-100 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-purple-100';

            const sections = [
                {
                    id: 'vision',
                    title: '🎯 Vision',
                    icon: '✨',
                    content: `ArtSoul is a revolutionary platform for decentralized art, where value is determined by the community, not by galleries or auction houses.

We create a space where every artist can present their work to the world, and the community decides its true value through a transparent auction process.`
                },
                {
                    id: 'problem',
                    title: '❓ Problem',
                    icon: '🔍',
                    content: `Traditional art market:
• Closed to most artists
• Prices set by galleries and critics
• High commissions (30-50%)
• No transparency in pricing
• Difficult access for collectors

Web3 solutions often:
• Too technical for regular users
• Focus only on NFTs
• Ignore real art
• Lack user-friendly UX`
                },
                {
                    id: 'solution',
                    title: '💡 Solution',
                    icon: '🚀',
                    content: `ArtSoul offers:

1. **Democratized Pricing**
   - Community votes with bids
   - Transparent price formation
   - No purchase obligation when bidding

2. **Multi-format Support**
   - NFT, video, music, GIF, photos
   - Real art (tokenized)
   - All in one place

3. **Easy to Use**
   - Two modes: Brutal (classic) and Future (Web3)
   - Intuitive interface
   - Drag & drop upload

4. **Multi-chain Support**
   - Ethereum, Polygon, BSC, Solana, Xion
   - Any wallet
   - Low fees`
                },
                {
                    id: 'how',
                    title: '⚙️ How It Works',
                    icon: '🔧',
                    content: `**For Artists:**
1. Create profile
2. Upload your work
3. Set your estimate (optional)
4. Community places bids
5. Floor price is formed
6. Work goes to auction

**For Collectors:**
1. Connect wallet
2. Browse gallery
3. Bid on works you like
4. Your bid influences floor price
5. Buy at market price

**Pricing:**
- Artist sets their estimate
- Community places bids
- Highest bid = floor price
- Not a purchase obligation
- It's a vote for value`
                },
                {
                    id: 'features',
                    title: '✨ Features',
                    icon: '🎨',
                    content: `**Current (v1.0):**
✅ Gallery with filters
✅ Auction system
✅ 2 UI themes (Brutal & Future)
✅ Smart upload system
✅ User profiles
✅ Personal galleries
✅ Animations and effects

**In Development (v2.0):**
🚧 Web3 integration (Wagmi/WalletConnect)
🚧 Multi-chain support
🚧 Smart contracts for auctions
🚧 NFT minting
🚧 IPFS storage

**Planned (v3.0):**
📅 Social features (follow, like, share)
📅 Music player (YouTube Music/Spotify)
📅 DAO governance
📅 Royalty system
📅 Mobile app`
                },
                {
                    id: 'roadmap',
                    title: '🗺️ Roadmap',
                    icon: '📍',
                    content: `**Q2 2026 (Current):**
✅ MVP platform
✅ Basic UI/UX
✅ Upload system
✅ Profiles

**Q3 2026:**
🎯 Web3 integration
🎯 Smart contracts
🎯 Multi-chain
🎯 IPFS

**Q4 2026:**
🎯 Social features
🎯 Music player
🎯 Mobile version
🎯 Developer API

**2027:**
🎯 DAO launch
🎯 Platform token
🎯 Governance
🎯 Gallery partnerships`
                },
                {
                    id: 'tech',
                    title: '🛠️ Technology',
                    icon: '💻',
                    content: `**Frontend:**
- React 18
- Tailwind CSS
- Framer Motion (animations)
- Next.js (future)

**Web3:**
- Wagmi (wallet integration)
- WalletConnect
- Ethers.js
- IPFS (storage)

**Blockchain:**
- Ethereum (main network)
- Polygon (low fees)
- BSC, Solana, Xion
- Smart contracts (Solidity)

**Backend (planned):**
- Node.js / Express
- PostgreSQL
- Redis (cache)
- AWS S3 (media)`
                },
                {
                    id: 'team',
                    title: '👥 Team',
                    icon: '🌟',
                    content: `**Founder:**
Maysonkiller (@maysonkiller23)
- Vision & Product
- Full-stack Development
- Web3 Integration

**Community:**
We're open to contributors!
- Developers
- Designers
- Artists
- Web3 experts

GitHub: github.com/maysonkiller/artsoul-marketplace`
                },
                {
                    id: 'why',
                    title: '💎 Why ArtSoul?',
                    icon: '🎭',
                    content: `**For Artists:**
• Direct access to global audience
• Fair pricing
• Low fees (5% vs 30-50%)
• Full control over works
• Royalties on secondary sales

**For Collectors:**
• Discover new talent
• Transparent pricing
• Participate in value formation
• Support artists directly
• Invest in art

**For Community:**
• Democratize art market
• Vote for value
• Influence culture
• Decentralize power
• New art economy`
                },
            ];

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${isBrutal ? 'bg-white/90 border-b border-gray-300' : 'bg-black/50 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <a href="artsoul.html" className={`text-2xl font-bold ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                        ArtSoul
                                    </a>
                                    <span className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                                        Documentation
                                    </span>
                                </div>

                                <div className="flex items-center gap-4">
                                    <div className={`flex gap-2 p-1 rounded-lg ${isBrutal ? 'bg-gray-200' : 'bg-gray-800/50'}`}>
                                        <button
                                            onClick={() => setTheme('brutal')}
                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
                                                theme === 'brutal'
                                                    ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50'
                                                    : isBrutal ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            Brutal
                                        </button>
                                        <button
                                            onClick={() => setTheme('future')}
                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
                                                theme === 'future'
                                                    ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg neon-border'
                                                    : isBrutal ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            Future
                                        </button>
                                    </div>

                                    <a href="index.html" className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                        isBrutal ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg' : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                    }`}>
                                        Back to Platform
                                    </a>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Hero */}
                    <section className="container mx-auto px-4 py-16 text-center">
                        <div className="animate-float inline-block text-8xl mb-6">
                            🎨
                        </div>
                        <h1 className={`text-6xl font-bold mb-6 animate-fadeIn ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                            ArtSoul Documentation
                        </h1>
                        <p className={`text-2xl mb-8 animate-fadeIn ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                            The Soul of Decentralized Art
                        </p>
                        <p className={`text-lg max-w-3xl mx-auto animate-fadeIn ${isBrutal ? 'text-gray-700' : 'text-gray-300'}`}>
                            Revolutionary platform for democratizing the art market through decentralized pricing and multi-chain technologies
                        </p>
                    </section>

                    {/* Table of Contents */}
                    <section className="container mx-auto px-4 mb-12">
                        <div className={`rounded-xl p-6 max-w-4xl mx-auto ${isBrutal ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                            <h2 className={`text-2xl font-bold mb-4 ${isBrutal ? 'text-gray-900' : 'text-cyan-400'}`}>
                                📑 Table of Contents
                            </h2>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                {sections.map(section => (
                                    <a
                                        key={section.id}
                                        href={`#${section.id}`}
                                        className={`p-3 rounded-lg text-center transform hover:scale-105 ${
                                            isBrutal
                                                ? 'bg-gray-100 hover:bg-gray-200 text-gray-700'
                                                : 'bg-gray-800/50 hover:bg-gray-700/50 text-cyan-300'
                                        }`}
                                    >
                                        <div className="text-2xl mb-1">{section.icon}</div>
                                        <div className="text-sm font-medium">{section.title}</div>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Content Sections */}
                    <section className="container mx-auto px-4 pb-16">
                        <div className="max-w-4xl mx-auto space-y-8">
                            {sections.map((section, index) => (
                                <div
                                    key={section.id}
                                    id={section.id}
                                    className={`rounded-xl p-8 animate-fadeIn ${
                                        isBrutal ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'
                                    }`}
                                    style={{animationDelay: `${index * 0.1}s`}}
                                >
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="text-5xl animate-float">{section.icon}</div>
                                        <h2 className={`text-3xl font-bold ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            {section.title}
                                        </h2>
                                    </div>
                                    <div className={`text-lg whitespace-pre-line leading-relaxed ${isBrutal ? 'text-gray-700' : 'text-gray-300'}`}>
                                        {section.content}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* CTA */}
                    <section className="container mx-auto px-4 pb-16">
                        <div className={`rounded-xl p-12 text-center max-w-4xl mx-auto ${
                            isBrutal ? 'bg-blue-600 text-white' : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white neon-border'
                        }`}>
                            <h2 className="text-4xl font-bold mb-4">Ready to Start?</h2>
                            <p className="text-xl mb-8">Join the decentralized art revolution</p>
                            <div className="flex gap-4 justify-center flex-wrap">
                                <a
                                    href="profile.html"
                                    className={`px-8 py-4 rounded-lg font-bold text-lg transform hover:scale-105 ${
                                        isBrutal ? 'bg-white text-blue-600' : 'bg-white text-purple-600'
                                    }`}
                                >
                                    Create Profile
                                </a>
                                <a
                                    href="upload.html"
                                    className={`px-8 py-4 rounded-lg font-bold text-lg transform hover:scale-105 ${
                                        isBrutal ? 'bg-purple-600 text-white' : 'bg-pink-600 text-white'
                                    }`}
                                >
                                    Upload Artwork
                                </a>
                                <a
                                    href="index.html"
                                    className={`px-8 py-4 rounded-lg font-bold text-lg transform hover:scale-105 ${
                                        isBrutal ? 'bg-gray-800 text-white' : 'bg-gray-900 text-cyan-400'
                                    }`}
                                >
                                    View Gallery
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="pb-8 text-center">
                        <p className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                            ArtSoul Marketplace - Built by <a href="https://twitter.com/maysonkiller23" target="_blank" className={isBrutal ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}>@maysonkiller23</a>
                        </p>
                        <p className={`text-xs mt-2 ${isBrutal ? 'text-gray-500' : 'text-gray-500'}`}>
                            Decentralizing art, one auction at a time
                        </p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<DocsPage />, document.getElementById('app'));
    </script>
</body>
</html>
