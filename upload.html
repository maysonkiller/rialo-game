<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Artwork - ArtSoul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: {
                            bg: '#f5f5f5',
                            text: '#1a1a1a',
                            accent: '#0066cc',
                        },
                        future: {
                            bg: '#0a0a0f',
                            text: '#e0e0ff',
                            neon: '#00ffff',
                            pink: '#ff00ff',
                            purple: '#8b00ff',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        /* Animations */
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        .neon-border {
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }
        .animate-slideIn {
            animation: slideIn 0.6s ease-out forwards;
        }

        /* Drag and drop zone */
        .drop-zone {
            border: 2px dashed;
            transition: all 0.3s ease;
        }
        .drop-zone.drag-over {
            transform: scale(1.02);
            border-style: solid;
        }

        /* File preview */
        .file-preview {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
    </style>
</head>
<body class="min-h-screen transition-colors duration-500">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect } = React;

        // File type detection
        const detectFileType = (file) => {
            const type = file.type;
            if (type.startsWith('image/')) return 'Image';
            if (type.startsWith('video/')) return 'Video';
            if (type.startsWith('audio/')) return 'Music';
            if (type === 'image/gif') return 'GIF';
            return 'Other';
        };

        // Get form fields based on file type
        const getFormFields = (fileType) => {
            const baseFields = {
                title: { label: 'Title', placeholder: 'Enter artwork title', required: true },
                description: { label: 'Description', placeholder: 'Tell the story behind your work', multiline: true, required: true },
                artistEstimate: { label: 'Your Estimated Value (ETH)', placeholder: '0.5', type: 'number', info: 'This is just for reference, community will set the floor price' },
            };

            const typeSpecific = {
                'Image': {
                    medium: { label: 'Medium', placeholder: 'Digital, Oil, Watercolor, etc.', required: true },
                    dimensions: { label: 'Dimensions', placeholder: 'e.g., 1920x1080 or 30x40cm' },
                    year: { label: 'Year Created', placeholder: '2026', type: 'number' },
                },
                'Video': {
                    duration: { label: 'Duration', placeholder: 'e.g., 2:30' },
                    resolution: { label: 'Resolution', placeholder: 'e.g., 1920x1080' },
                    fps: { label: 'FPS', placeholder: '30', type: 'number' },
                },
                'Music': {
                    genre: { label: 'Genre', placeholder: 'Electronic, Classical, etc.' },
                    duration: { label: 'Duration', placeholder: 'e.g., 3:45' },
                    bpm: { label: 'BPM', placeholder: '120', type: 'number' },
                },
                'GIF': {
                    duration: { label: 'Loop Duration', placeholder: 'e.g., 5s' },
                    frames: { label: 'Frame Count', placeholder: '60', type: 'number' },
                },
            };

            return { ...baseFields, ...(typeSpecific[fileType] || {}) };
        };

        function UploadPage() {
            const [theme, setTheme] = useState('brutal');
            const [file, setFile] = useState(null);
            const [fileType, setFileType] = useState(null);
            const [preview, setPreview] = useState(null);
            const [formData, setFormData] = useState({});
            const [dragOver, setDragOver] = useState(false);
            const [uploading, setUploading] = useState(false);

            const isBrutal = theme === 'brutal';

            // Handle file selection
            const handleFileSelect = (selectedFile) => {
                if (!selectedFile) return;

                setFile(selectedFile);
                const type = detectFileType(selectedFile);
                setFileType(type);

                // Create preview
                const reader = new FileReader();
                reader.onload = (e) => setPreview(e.target.result);
                reader.readAsDataURL(selectedFile);

                // Initialize form data
                setFormData({
                    title: selectedFile.name.replace(/\.[^/.]+$/, ''),
                    description: '',
                    artistEstimate: '',
                });
            };

            // Drag and drop handlers
            const handleDragOver = (e) => {
                e.preventDefault();
                setDragOver(true);
            };

            const handleDragLeave = () => {
                setDragOver(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const droppedFile = e.dataTransfer.files[0];
                handleFileSelect(droppedFile);
            };

            // Form submission
            const handleSubmit = async (e) => {
                e.preventDefault();
                setUploading(true);

                // Simulate upload
                await new Promise(resolve => setTimeout(resolve, 2000));

                // Save to localStorage (for prototype)
                const artworks = JSON.parse(localStorage.getItem('artworks') || '[]');
                const newArtwork = {
                    id: Date.now(),
                    ...formData,
                    type: fileType,
                    fileName: file.name,
                    fileSize: file.size,
                    preview: preview,
                    uploadedAt: new Date().toISOString(),
                    currentBid: parseFloat(formData.artistEstimate) || 0,
                    bids: [],
                };
                artworks.push(newArtwork);
                localStorage.setItem('artworks', JSON.stringify(artworks));

                setUploading(false);
                alert('Artwork uploaded successfully! Redirecting to gallery...');
                window.location.href = 'index.html';
            };

            const formFields = fileType ? getFormFields(fileType) : {};

            const bgClass = isBrutal
                ? 'bg-gray-100 text-gray-900'
                : 'bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-purple-100';

            return (
                <div className={`min-h-screen ${bgClass} transition-all duration-500`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 backdrop-blur-md ${isBrutal ? 'bg-white/90 border-b border-gray-300' : 'bg-black/50 border-b border-cyan-500/30'}`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <a href="index.html" className={`text-2xl font-bold ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                        ArtSoul
                                    </a>
                                    <span className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                                        Upload Artwork
                                    </span>
                                </div>

                                <div className="flex items-center gap-4">
                                    <div className={`flex gap-2 p-1 rounded-lg ${isBrutal ? 'bg-gray-200' : 'bg-gray-800/50'}`}>
                                        <button
                                            onClick={() => setTheme('brutal')}
                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
                                                theme === 'brutal'
                                                    ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50'
                                                    : isBrutal ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            Brutal
                                        </button>
                                        <button
                                            onClick={() => setTheme('future')}
                                            className={`px-4 py-2 rounded-md font-medium transform hover:scale-105 ${
                                                theme === 'future'
                                                    ? 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg neon-border'
                                                    : isBrutal ? 'text-gray-700 hover:bg-gray-300' : 'text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            Future
                                        </button>
                                    </div>

                                    <a
                                        href="index.html"
                                        className={`px-6 py-2 rounded-lg font-medium transform hover:scale-105 ${
                                            isBrutal
                                                ? 'bg-gray-600 text-white hover:bg-gray-700'
                                                : 'bg-gray-700 text-white hover:bg-gray-600'
                                        }`}
                                    >
                                        Back to Gallery
                                    </a>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        <div className="max-w-4xl mx-auto">
                            <h1 className={`text-4xl font-bold mb-2 animate-fadeIn ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                Upload Your Artwork
                            </h1>
                            <p className={`text-lg mb-8 animate-fadeIn ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                                Share your art with the world. Community will discover its true value.
                            </p>

                            {/* Upload Zone */}
                            {!file ? (
                                <div
                                    className={`drop-zone rounded-xl p-12 text-center animate-fadeIn ${
                                        dragOver
                                            ? isBrutal
                                                ? 'border-blue-600 bg-blue-50'
                                                : 'border-cyan-400 bg-cyan-900/20 neon-border'
                                            : isBrutal
                                                ? 'border-gray-300 bg-white'
                                                : 'border-cyan-500/30 bg-gray-900/50'
                                    }`}
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                >
                                    <div className={`text-6xl mb-4 ${isBrutal ? 'text-gray-400' : 'text-cyan-400'}`}>
                                        📤
                                    </div>
                                    <h3 className={`text-2xl font-bold mb-2 ${isBrutal ? 'text-gray-900' : 'text-cyan-300'}`}>
                                        Drag & Drop Your File
                                    </h3>
                                    <p className={`mb-6 ${isBrutal ? 'text-gray-600' : 'text-gray-400'}`}>
                                        or click to browse
                                    </p>
                                    <input
                                        type="file"
                                        id="fileInput"
                                        className="hidden"
                                        accept="image/*,video/*,audio/*"
                                        onChange={(e) => handleFileSelect(e.target.files[0])}
                                    />
                                    <label
                                        htmlFor="fileInput"
                                        className={`inline-block px-8 py-3 rounded-lg font-bold cursor-pointer transform hover:scale-105 ${
                                            isBrutal
                                                ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-500/50'
                                                : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                        }`}
                                    >
                                        Choose File
                                    </label>
                                    <p className={`mt-4 text-sm ${isBrutal ? 'text-gray-500' : 'text-gray-500'}`}>
                                        Supported: Images, Videos, GIFs, Music (Max 100MB)
                                    </p>
                                </div>
                            ) : (
                                <form onSubmit={handleSubmit} className="space-y-6 animate-fadeIn">
                                    {/* File Preview */}
                                    <div className={`rounded-xl p-6 ${isBrutal ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                                        <div className="flex items-start gap-6">
                                            <div className="flex-shrink-0">
                                                {fileType === 'Image' || fileType === 'GIF' ? (
                                                    <img src={preview} alt="Preview" className="file-preview rounded-lg" />
                                                ) : fileType === 'Video' ? (
                                                    <video src={preview} controls className="file-preview rounded-lg" />
                                                ) : fileType === 'Music' ? (
                                                    <div className={`w-64 h-64 rounded-lg flex items-center justify-center ${isBrutal ? 'bg-gray-100' : 'bg-gradient-to-br from-purple-900/50 to-cyan-900/50'}`}>
                                                        <div className="text-center">
                                                            <div className={`text-6xl mb-4 ${isBrutal ? 'text-gray-400' : 'text-cyan-400'}`}>🎵</div>
                                                            <audio src={preview} controls className="w-full" />
                                                        </div>
                                                    </div>
                                                ) : null}
                                            </div>

                                            <div className="flex-1">
                                                <div className={`inline-block px-3 py-1 rounded-full text-sm font-medium mb-3 ${
                                                    isBrutal ? 'bg-blue-100 text-blue-700' : 'bg-cyan-900/50 text-cyan-300'
                                                }`}>
                                                    {fileType}
                                                </div>
                                                <h3 className={`text-xl font-bold mb-2 ${isBrutal ? 'text-gray-900' : 'text-cyan-300'}`}>
                                                    {file.name}
                                                </h3>
                                                <p className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-gray-400'}`}>
                                                    Size: {(file.size / 1024 / 1024).toFixed(2)} MB
                                                </p>
                                                <button
                                                    type="button"
                                                    onClick={() => {
                                                        setFile(null);
                                                        setFileType(null);
                                                        setPreview(null);
                                                        setFormData({});
                                                    }}
                                                    className={`mt-4 px-4 py-2 rounded-lg text-sm font-medium ${
                                                        isBrutal
                                                            ? 'bg-red-100 text-red-700 hover:bg-red-200'
                                                            : 'bg-red-900/50 text-red-300 hover:bg-red-900/70'
                                                    }`}
                                                >
                                                    Remove File
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Dynamic Form Fields */}
                                    <div className={`rounded-xl p-6 ${isBrutal ? 'bg-white shadow-lg' : 'bg-gray-900/50 backdrop-blur-md border border-cyan-500/30'}`}>
                                        <h3 className={`text-2xl font-bold mb-6 ${isBrutal ? 'text-gray-900' : 'text-cyan-400 neon-glow'}`}>
                                            Artwork Details
                                        </h3>

                                        <div className="space-y-4">
                                            {Object.entries(formFields).map(([key, field]) => (
                                                <div key={key} className="animate-slideIn">
                                                    <label className={`block text-sm font-semibold mb-2 ${isBrutal ? 'text-gray-700' : 'text-cyan-300'}`}>
                                                        {field.label} {field.required && <span className="text-red-500">*</span>}
                                                    </label>
                                                    {field.multiline ? (
                                                        <textarea
                                                            value={formData[key] || ''}
                                                            onChange={(e) => setFormData({...formData, [key]: e.target.value})}
                                                            placeholder={field.placeholder}
                                                            required={field.required}
                                                            rows={4}
                                                            className={`w-full px-4 py-3 rounded-lg ${
                                                                isBrutal
                                                                    ? 'bg-gray-50 border border-gray-300 text-gray-900 focus:ring-2 focus:ring-blue-600'
                                                                    : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100 focus:ring-2 focus:ring-cyan-400'
                                                            } outline-none transition-all`}
                                                        />
                                                    ) : (
                                                        <input
                                                            type={field.type || 'text'}
                                                            value={formData[key] || ''}
                                                            onChange={(e) => setFormData({...formData, [key]: e.target.value})}
                                                            placeholder={field.placeholder}
                                                            required={field.required}
                                                            step={field.type === 'number' ? '0.01' : undefined}
                                                            className={`w-full px-4 py-3 rounded-lg ${
                                                                isBrutal
                                                                    ? 'bg-gray-50 border border-gray-300 text-gray-900 focus:ring-2 focus:ring-blue-600'
                                                                    : 'bg-gray-800/50 border border-cyan-500/30 text-cyan-100 focus:ring-2 focus:ring-cyan-400'
                                                            } outline-none transition-all`}
                                                        />
                                                    )}
                                                    {field.info && (
                                                        <p className={`mt-1 text-xs ${isBrutal ? 'text-gray-500' : 'text-gray-400'}`}>
                                                            ℹ️ {field.info}
                                                        </p>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Submit Button */}
                                    <button
                                        type="submit"
                                        disabled={uploading}
                                        className={`w-full py-4 rounded-lg font-bold text-lg transform hover:scale-105 ${
                                            uploading
                                                ? 'bg-gray-400 text-gray-600 cursor-not-allowed'
                                                : isBrutal
                                                    ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-500/50'
                                                    : 'bg-gradient-to-r from-cyan-500 to-purple-500 text-white hover:shadow-2xl neon-border'
                                        }`}
                                    >
                                        {uploading ? 'Uploading...' : 'Submit to Auction'}
                                    </button>
                                </form>
                            )}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="mt-16 pb-8 text-center">
                        <p className={`text-sm ${isBrutal ? 'text-gray-600' : 'text-purple-300'}`}>
                            ArtSoul Marketplace - Built by <a href="https://twitter.com/maysonkiller23" target="_blank" className={isBrutal ? 'text-blue-600 hover:underline' : 'text-cyan-400 hover:underline'}>@maysonkiller23</a>
                        </p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<UploadPage />, document.getElementById('app'));
    </script>
</body>
</html>
