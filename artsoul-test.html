<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtSoul - Decentralized Art Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: {
                            bg: '#f5f5f5',
                            text: '#1a1a1a',
                            accent: '#0066cc',
                        },
                        future: {
                            bg: '#0a0a0f',
                            text: '#e0e0ff',
                            neon: '#00ffff',
                            pink: '#ff00ff',
                            purple: '#8b00ff',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        /* Smooth transitions */
        * {
            transition: all 0.3s ease;
        }

        /* Neon effects */
        .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        .neon-border {
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
            animation: border-glow 3s ease-in-out infinite;
        }

        /* Animations */
        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        @keyframes border-glow {
            0%, 100% { box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            50% { box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 45px #00ffff; }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Hover effects */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
        }

        /* Gradient backgrounds */
        .gradient-brutal {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        }
        .gradient-future {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
        }

        /* Shimmer effect for loading */
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }

        /* Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Glassmorphism */
        .glass {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="min-h-screen transition-colors duration-500">
    <div id="app"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect } = React;

        const mockArtworks = [
            { id: 1, title: 'Soul Flame', artist: 'Maysonkiller', type: 'NFT', description: 'A burning representation of the digital soul', currentBid: 0.5, bids: [0.3, 0.4, 0.5] },
            { id: 2, title: 'Neon Dreams', artist: 'CryptoArtist', type: 'Digital Art', description: 'Futuristic cityscape in neon colors', currentBid: 1.2, bids: [0.8, 1.0, 1.2] },
            { id: 3, title: 'Silent Choir', artist: 'Maysonkiller', type: 'Video', description: 'An audiovisual journey through silence', currentBid: 0.8, bids: [0.5, 0.7, 0.8] },
            { id: 4, title: 'Cosmic Melancholy', artist: 'StarGazer', type: 'GIF', description: 'Animated loop of cosmic emotions', currentBid: 0.3, bids: [0.1, 0.2, 0.3] },
            { id: 5, title: 'Real Canvas #1', artist: 'TraditionalArt', type: 'Physical Art', description: 'Oil painting on canvas - tokenized', currentBid: 2.5, bids: [1.5, 2.0, 2.5] },
            { id: 6, title: 'Pixel Poetry', artist: 'DigitalPoet', type: 'Image', description: 'Generative pixel art with hidden meaning', currentBid: 0.6, bids: [0.4, 0.5, 0.6] },
        ];

        function App() {
            const [theme, setTheme] = useState('brutal');
            const [walletConnected, setWalletConnected] = useState(false);
            const [filter, setFilter] = useState('all');
            const [bidAmount, setBidAmount] = useState('');
            const [timeLeft, setTimeLeft] = useState(3 * 24 * 60 * 60);
            const [allArtworks, setAllArtworks] = useState([]);
            const [selectedArtwork, setSelectedArtwork] = useState(null);
        function App() {
            return (
                <div className="min-h-screen bg-gray-100 p-8">
                    <h1 className="text-4xl font-bold text-center">ArtSoul Gallery</h1>
                    <p className="text-center mt-4">Testing React rendering...</p>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
